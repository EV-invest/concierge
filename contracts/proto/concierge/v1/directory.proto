syntax = "proto3";

package concierge.v1;

// UserDirectory — the authoritative user/identity control plane.
//
// Owns investor accounts and their profile metadata. This is the identity plane:
// money lives in the separate banking plane and is NEVER mirrored here. Every RPC
// is authorized from the verified access-token Claims injected by the inbound auth
// layer; self-service RPCs act on the caller's own `sub`, admin RPCs are gated by
// the admin allowlist (config).
service UserDirectory {
  // The calling user's own identity (resolved from the access-token `sub`).
  rpc GetMe(GetMeRequest) returns (UserProfile);

  // Update the caller's own editable profile fields (full-replace of the set in
  // UpdateProfileRequest). Identity/auth fields (email, status) are not editable here.
  rpc UpdateProfile(UpdateProfileRequest) returns (UserProfile);

  // Admin (allowlist): bump a user's token_version so all their outstanding access
  // tokens are rejected. The token-revocation control surface.
  rpc RevokeTokens(RevokeTokensRequest) returns (RevokeTokensResponse);

  // Admin (allowlist): disable a user, freezing future sign-in/refresh without
  // deleting the record. Emits SUSPENDED across the cross-plane bridge.
  rpc DisableUser(DisableUserRequest) returns (DisableUserResponse);

  // Admin (allowlist): re-enable a disabled user, lifting the sign-in/refresh
  // freeze. Emits REINSTATED across the cross-plane bridge.
  rpc ReinstateUser(ReinstateUserRequest) returns (ReinstateUserResponse);

  // Admin (allowlist): set a user's KYC level. Emits KYC_CHANGED across the
  // cross-plane bridge (so the money plane learns the new level). Echoes the
  // level now in effect.
  rpc SetKycLevel(SetKycLevelRequest) returns (SetKycLevelResponse);

  // Admin (UserRead): list/search users for the operator console — paginated, with a
  // free-text query and optional role/status filters (see ListUsersRequest). Returns
  // lightweight summaries, not full profiles.
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // Admin (UserRead): the full profile of ANY user by id (the admin sibling of the
  // self-only GetMe), for the user-detail drawer.
  rpc GetUser(GetUserRequest) returns (UserProfile);

  // Admin (RoleGrant, Owner only): set a user's platform access role. Emits
  // ROLE_CHANGED across the cross-plane bridge so the money plane mirrors it. Echoes
  // the role now in effect.
  rpc SetRole(SetRoleRequest) returns (SetRoleResponse);
}

message GetMeRequest {}

message UserProfile {
  string user_id = 1;
  string email = 2;
  bool email_verified = 3;
  string status = 4;
  uint64 token_version = 5;
  // Editable profile fields (control plane; empty until the user sets them). email and
  // status above stay read-only — email is the IdP's, status is admin-managed.
  string legal_name = 6;
  string preferred_name = 7;
  string phone = 8;
  string date_of_birth = 9;
  string nationality = 10;
  string tax_residence = 11;
  string residential_address = 12;
  string language = 13;
  string base_currency = 14;
  string timezone = 15;
  // The user's KYC level (admin-managed; mirrored to the money plane).
  uint32 kyc_level = 16;
  // The user's platform access role (snake_case: investor/operator/admin/owner).
  // Admin-managed via SetRole; read-only here.
  string role = 17;
}

// The caller's editable profile, full-replace. Same 10 fields as the editable part of
// UserProfile; an empty string clears the field.
message UpdateProfileRequest {
  string legal_name = 1;
  string preferred_name = 2;
  string phone = 3;
  string date_of_birth = 4;
  string nationality = 5;
  string tax_residence = 6;
  string residential_address = 7;
  string language = 8;
  string base_currency = 9;
  string timezone = 10;
}

message RevokeTokensRequest {
  string user_id = 1;
}

message RevokeTokensResponse {
  uint64 token_version = 1;
}

message DisableUserRequest {
  string user_id = 1;
}

message DisableUserResponse {}

message ReinstateUserRequest {
  string user_id = 1;
}

message ReinstateUserResponse {}

message SetKycLevelRequest {
  string user_id = 1;
  uint32 kyc_level = 2;
}

message SetKycLevelResponse {
  // The user's KYC level now in effect (echoes the applied level).
  uint32 kyc_level = 1;
}

// A lightweight user row for the operator console's user list (not the full profile).
// Named distinctly from auth.proto's login `UserSummary` (same package).
message AdminUserSummary {
  string user_id = 1;
  string email = 2;
  string status = 3;
  uint32 kyc_level = 4;
  string role = 5;
  uint64 token_version = 6;
  // Unix SECONDS the user was provisioned (joined).
  int64 created_at = 7;
}

message ListUsersRequest {
  // Free-text match over email/user_id (empty = no text filter).
  string query = 1;
  // Optional exact filters (empty string = unfiltered).
  string role = 2;
  string status = 3;
  // Page window. `limit` is clamped server-side; `offset` is a simple row offset.
  uint32 limit = 4;
  uint32 offset = 5;
}

message ListUsersResponse {
  repeated AdminUserSummary users = 1;
  // Total matching the filters (before the page window), for the list header count.
  uint64 total = 2;
}

message GetUserRequest {
  string user_id = 1;
}

message SetRoleRequest {
  string user_id = 1;
  // The role to grant (snake_case: investor/operator/admin/owner).
  string role = 2;
}

message SetRoleResponse {
  // The role now in effect (echoes the applied role).
  string role = 1;
}
