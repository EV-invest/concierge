syntax = "proto3";

package concierge.v1;

// Cross-plane bridge â€” the ONE-WAY identityâ†’money seam.
//
// `UserLifecycleEvent` is emitted by concierge's outbox when an identity changes
// state, and consumed by the banking money plane to gate or freeze money ops
// (e.g. a SUSPENDED user or a SESSIONS_REVOKED bump must stop downstream
// authorization). Banking PULLS â€” concierge never calls banking.
//
// `UserEvents.PullUserLifecycle` serves `user_outbox` rows with
// `position > after_position`, oldest-first, capped by `limit`; the puller stores
// `next_position` as its cursor and advances. Read-only: concierge never deletes
// rows â€” banking dedupes by `event_id` and orders per-user by `sequence`.
//
// The seam is authenticated with a shared bridge service token (env
// BRIDGE_SERVICE_TOKEN on both ends). Graduate to mTLS/SPIFFE at platform scale.
service UserEvents {
  rpc PullUserLifecycle(PullUserLifecycleRequest) returns (PullUserLifecycleResponse);
}

message PullUserLifecycleRequest {
  // Exclusive lower bound: serve rows with `position > after_position`. The puller's
  // stored cursor; 0 to read from the beginning of the outbox.
  int64 after_position = 1;
  // Max rows to return. The server caps this at its own ceiling.
  uint32 limit = 2;
}

message PullUserLifecycleResponse {
  // The matched events, oldest-first by `position`.
  repeated UserLifecycleEvent events = 1;
  // The cursor to pass as the next `after_position`: the max `position` returned, or
  // the request's `after_position` unchanged when no rows matched.
  int64 next_position = 2;
}

message UserLifecycleEvent {
  // The concierge canonical user id (a UUID) the event is about.
  string user_id = 1;

  // What changed about the user's lifecycle.
  enum Kind {
    KIND_UNSPECIFIED = 0;
    CREATED = 1;
    SUSPENDED = 2;
    REINSTATED = 3;
    KYC_CHANGED = 4;
    SESSIONS_REVOKED = 5;
  }
  Kind kind = 2;

  // The user's KYC level after the change (relevant chiefly for KYC_CHANGED).
  uint32 kyc_level = 3;

  // When the change happened, unix SECONDS.
  int64 occurred_at = 4;

  // The outbox row key (a UUID), minted by the concierge outbox when the row is
  // written. The unit of at-least-once delivery: the banking consumer upserts /
  // dedupes by this id, so a redelivery or two same-second events are distinct.
  string event_id = 5;

  // Per-user strictly-increasing version, stamped from the user's row version at
  // emit time. event_id gives dedupe; this gives ORDER â€” the consumer applies an
  // event only if its sequence exceeds the last one stored for the user, so a
  // stale REINSTATED cannot un-freeze a user a later SUSPENDED already froze.
  uint64 sequence = 6;

  // The shared correlation key both planes provision against: the provider
  // (Google) `sub`. user_id above is concierge's OWN canonical id and means
  // nothing to banking, which keys its users on this subject â€” so this is what
  // the banking provisioner matches a CREATED event to a local UserId on.
  string auth_subject = 7;

  // Identity payload banking needs to materialize a user from CREATED without a
  // synchronous callback (which would defeat the one-way bridge).
  string email = 8;
  bool email_verified = 9;

  // The user's token_version after the change. SESSIONS_REVOKED carries the new
  // floor so a banking consumer gating on token_version learns the value to
  // store, not merely that "something was revoked".
  uint64 token_version = 10;
}
